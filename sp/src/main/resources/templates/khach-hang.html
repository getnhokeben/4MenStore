<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý khách hàng</title>
    <script src="/js/app-shell.js" defer></script>
    <style>
        /* Giữ nguyên toàn bộ CSS như bản trước, không thay đổi */
        *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f3f4f6;color:#172033}.page{min-height:100vh;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:14px}.title h1{font-size:22px;margin:0 0 4px;font-weight:800}.title p{margin:0;color:#6b7280;font-size:13px}.toolbar{display:flex;gap:8px;align-items:center}.btn{height:36px;border:1px solid #dde3ea;border-radius:8px;background:#fff;color:#172033;font-weight:700;font-size:13px;padding:0 13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none;transition:all 0.2s}.btn:hover{background:#f8fafc}.btn.primary{background:#c8a474;border-color:#c8a474;color:#fff}.btn.primary:hover{background:#b8945a;border-color:#b8945a}.btn.danger{color:#dc2626}.btn.danger:hover{background:#fee2e2}.btn.icon{width:34px;padding:0;justify-content:center}.btn:disabled{opacity:0.5;cursor:not-allowed}.btn-clear{background:#fee2e2;color:#dc2626;border-color:#fecaca}.btn-clear:hover{background:#fecaca}.panel{background:#fff;border:1px solid #dde3ea;border-radius:8px;overflow:hidden}.filters{display:grid;grid-template-columns:minmax(260px,1fr) 190px;gap:12px;padding:16px;border-bottom:1px solid #e5e7eb;align-items:end}.field label{display:block;font-size:12px;color:#64748b;font-weight:800;margin-bottom:6px;text-transform:uppercase}.field input,.field select{width:100%;height:38px;border:1px solid #d8dee8;border-radius:8px;padding:0 11px;font-size:14px;background:#fff;transition:border 0.2s}.field input:focus,.field select:focus{outline:2px solid rgba(200,164,116,.25);border-color:#c8a474}.field input:disabled{background:#f1f5f9;color:#64748b;cursor:not-allowed}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:950px}th{height:44px;background:#f8fafc;border-bottom:1px solid #e5e7eb;color:#64748b;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.02em;padding:0 14px;font-weight:700}td{height:50px;border-bottom:1px solid #edf0f4;padding:0 14px;font-size:14px;vertical-align:middle}tr:hover td{background:#fcfcfd}.code{display:inline-flex;background:#f1f5f9;border-radius:5px;padding:3px 7px;font-size:12px;font-weight:800;color:#334155;font-family:monospace}.badge{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.badge.on{background:#dcfce7;color:#16a34a}.badge.off{background:#fee2e2;color:#dc2626}.actions{display:flex;align-items:center;gap:6px}.action-btn{background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:15px;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center}.action-btn:hover{background:#f1f5f9}.action-btn.edit{color:#2563eb}.switch{position:relative;display:inline-flex;width:36px;height:20px}.switch input{display:none}.switch span{position:absolute;inset:0;background:#cbd5e1;border-radius:999px;cursor:pointer;transition:.2s}.switch span:before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}.switch input:checked+span{background:#16a34a}.switch input:checked+span:before{transform:translateX(16px)}.empty{padding:42px 18px;text-align:center;color:#64748b}.modal{position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:1000;display:flex;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}.modal[hidden]{display:none}.modal-box{width:min(800px,100%);background:#fff;border-radius:8px;box-shadow:0 20px 60px rgba(15,23,42,.22);overflow:hidden;max-height:90vh;overflow-y:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1}.modal-head h2{font-size:18px;margin:0}.modal-body{padding:18px 20px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid #e5e7eb;background:#fafbfc;border-radius:0 0 8px 8px}.full{grid-column:1/-1}.required{color:#dc2626;margin-left:2px}.toast{position:fixed;right:18px;bottom:18px;z-index:1200;background:#172033;color:#fff;padding:12px 14px;border-radius:8px;font-size:13px;max-width:360px;box-shadow:0 12px 30px rgba(15,23,42,.24);animation:slideUp 0.3s ease}.toast.error{background:#b91c1c}.toast.success{background:#15803d}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.filter-actions{display:flex;gap:8px;align-items:end}.field-note{font-size:11px;color:#94a3b8;margin-top:4px;font-style:italic}.address-full{grid-column:1/-1;border-top:1px solid #e5e7eb;padding-top:14px;margin-top:6px}.address-full .address-label{font-size:13px;font-weight:700;color:#334155;margin-bottom:10px;display:block}.address-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.address-row .field{margin-bottom:0}

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 12px 0;
            flex-wrap: wrap;
            border-top: 1px solid #e5e7eb;
            margin-top: 0;
        }
        .pagination .btn {
            min-width: 36px;
            justify-content: center;
            font-size: 13px;
        }
        .pagination .btn.primary {
            background: #c8a474;
            border-color: #c8a474;
            color: #fff;
        }
        .pagination .btn.primary:hover {
            background: #b8945a;
            border-color: #b8945a;
        }
        .pagination .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            color: #64748b;
            font-size: 13px;
            padding: 0 10px;
        }
        .summary-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: #f8fafc;
            border-bottom: 1px solid #e5e7eb;
            font-size: 13px;
            color: #64748b;
        }
        .summary-bar .total {
            font-weight: 600;
            color: #172033;
        }
        .page-size-selector {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .page-size-selector select {
            height: 32px;
            border: 1px solid #d8dee8;
            border-radius: 6px;
            padding: 0 8px;
            font-size: 13px;
            background: #fff;
        }
        .col-cccd {
            display: none;
        }
        @media(max-width:900px){
            .filters{grid-template-columns:1fr}
            .topbar{align-items:flex-start;flex-direction:column}
            .modal-body{grid-template-columns:1fr}
            .page{padding:16px}
            .address-row{grid-template-columns:1fr}
            .summary-bar{flex-direction:column;gap:8px;align-items:flex-start}
        }
    </style>
</head>
<body>
<aside class="sidebar"></aside>
<main class="main page">
    <div class="topbar">
        <div class="title">
            <h1>Quản lý khách hàng</h1>
        </div>
        <div class="toolbar">
            <button class="btn" id="exportBtn">⬇ Tải Excel</button>
            <button class="btn primary" id="addBtn">＋ Thêm</button>
        </div>
    </div>

    <section class="panel">
        <form class="filters" id="filterForm">
            <div class="field">
                <label>Tìm kiếm</label>
                <input name="keyword" placeholder="Mã, tên, email, số điện thoại" id="keywordInput">
            </div>
            <div class="field">
                <label>Trạng thái</label>
                <select name="trangThai" id="statusSelect">
                    <option value="">Tất cả</option>
                    <option value="true">Hoạt động</option>
                    <option value="false">Ngừng hoạt động</option>
                </select>
            </div>
        </form>

        <div class="summary-bar">
            <span>Tổng: <span class="total" id="totalCount">0</span> khách hàng</span>
            <div class="page-size-selector">
                <span>Hiển thị:</span>
                <select id="pageSizeSelect">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th style="width:50px;">STT</th>
                    <th style="width:100px;">Mã KH</th>
                    <th>Tên khách hàng</th>
                    <th>Email</th>
                    <th>Số điện thoại</th>
                    <th class="col-cccd">CCCD</th>
                    <th>Địa chỉ</th>
                    <th>Giới tính</th>
                    <th>Ngày sinh</th>
                    <th>Trạng thái</th>
                    <th style="width:100px;">Hành động</th>
                </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
            <div class="empty" id="empty" hidden>Không có khách hàng</div>
            <div id="pagination" class="pagination"></div>
        </div>
    </section>
</main>

<!-- MODAL -->
<div class="modal" id="customerModal" hidden>
    <form class="modal-box" id="customerForm">
        <div class="modal-head">
            <h2 id="modalTitle">Thêm khách hàng</h2>
            <button class="btn icon" type="button" id="closeModal">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" name="id">

            <!-- ĐÃ XÓA toàn bộ phần info-box về mã tự động -->
            <!-- ĐÃ XÓA toàn bộ phần thông báo về mật khẩu -->

            <div class="field">
                <label>Tên khách hàng <span class="required">*</span></label>
                <input name="tenKhachHang" id="inputTenKhachHang" required>
            </div>
            <div class="field">
                <label>Email</label>
                <input name="email" id="inputEmail" type="email">
            </div>
            <div class="field">
                <label>Số điện thoại</label>
                <input name="soDienThoai" id="inputSoDienThoai">
            </div>
            <div class="field">
                <label>CCCD</label>
                <input name="cccd" id="inputCccd" maxlength="12">
            </div>
            <div class="field">
                <label>Giới tính</label>
                <select name="gioiTinh" id="inputGioiTinh">
                    <option value="">Chọn</option>
                    <option>Nam</option>
                    <option>Nữ</option>
                    <option>Khác</option>
                </select>
            </div>
            <div class="field">
                <label>Ngày sinh</label>
                <input name="ngaySinh" id="inputNgaySinh" type="date">
            </div>

            <!-- ĐÃ XÓA trường Trạng thái (cả dropdown và hidden) -->

            <div class="full address-full">
                <span class="address-label">📍 Địa chỉ</span>
                <div class="address-row">
                    <div class="field">
                        <label>Tỉnh/Thành phố</label>
                        <select id="provinceSelect">
                            <option value="">-- Chọn Tỉnh/Thành --</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Quận/Huyện</label>
                        <select id="districtSelect">
                            <option value="">-- Chọn Quận/Huyện --</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Phường/Xã</label>
                        <select id="wardSelect">
                            <option value="">-- Chọn Phường/Xã --</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Địa chỉ chi tiết</label>
                        <input name="diaChiChiTiet" id="inputDiaChiChiTiet">
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn" type="button" id="cancelBtn">Hủy</button>
            <button class="btn primary" type="submit">💾 Lưu & gửi mail</button>
        </div>
    </form>
</div>

<script>
    const API = '/api/khach-hang';
    const PROVINCE_API = 'https://provinces.open-api.vn/api/v1';

    const state = {
        items: [],
        currentPage: 1,
        pageSize: 10
    };

    const $ = (id) => document.getElementById(id);
    const form = $('customerForm');
    const filterForm = $('filterForm');

    let searchTimeout = null;

    // ===== API tỉnh thành =====
    async function loadProvinces() {
        try {
            const response = await fetch(`${PROVINCE_API}/`);
            const provinces = await response.json();
            const select = document.getElementById('provinceSelect');
            select.innerHTML = '<option value="">-- Chọn Tỉnh/Thành --</option>';
            provinces.forEach(p => {
                const option = document.createElement('option');
                option.value = p.code;
                option.textContent = p.name;
                select.appendChild(option);
            });
            document.getElementById('districtSelect').innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
            document.getElementById('wardSelect').innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
        } catch (error) {
            console.error('Lỗi tải tỉnh thành:', error);
            toast('Không thể tải danh sách tỉnh thành', true);
        }
    }

    async function onProvinceChange() {
        const provinceCode = document.getElementById('provinceSelect').value;
        const districtSelect = document.getElementById('districtSelect');
        const wardSelect = document.getElementById('wardSelect');

        if (!provinceCode) {
            districtSelect.innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
            wardSelect.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
            return;
        }

        try {
            const response = await fetch(`${PROVINCE_API}/p/${provinceCode}?depth=2`);
            const data = await response.json();
            districtSelect.innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
            if (data.districts) {
                data.districts.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d.code;
                    option.textContent = d.name;
                    districtSelect.appendChild(option);
                });
            }
            wardSelect.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
        } catch (error) {
            console.error('Lỗi tải quận/huyện:', error);
            toast('Không thể tải danh sách quận/huyện', true);
        }
    }

    async function onDistrictChange() {
        const districtCode = document.getElementById('districtSelect').value;
        const wardSelect = document.getElementById('wardSelect');

        if (!districtCode) {
            wardSelect.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
            return;
        }

        try {
            const response = await fetch(`${PROVINCE_API}/d/${districtCode}?depth=2`);
            const data = await response.json();
            wardSelect.innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
            if (data.wards) {
                data.wards.forEach(w => {
                    const option = document.createElement('option');
                    option.value = w.code;
                    option.textContent = w.name;
                    wardSelect.appendChild(option);
                });
            }
        } catch (error) {
            console.error('Lỗi tải phường/xã:', error);
            toast('Không thể tải danh sách phường/xã', true);
        }
    }

    // ===== Dự đoán mã KH ===== (vẫn dùng để hiển thị ở đâu đó nếu cần, nhưng đã xóa khỏi UI)
    function predictNextMaKh() {
        let maxNumber = 0;
        state.items.forEach(kh => {
            if (kh.maKh && kh.maKh.startsWith('KH')) {
                try {
                    const num = parseInt(kh.maKh.substring(2));
                    if (num > maxNumber) maxNumber = num;
                } catch (e) {}
            }
        });
        return `KH${String(maxNumber + 1).padStart(3, '0')}`;
    }

    // ===== Khởi tạo =====
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('provinceSelect').addEventListener('change', onProvinceChange);
        document.getElementById('districtSelect').addEventListener('change', onDistrictChange);

        $('addBtn').addEventListener('click', () => openModal());
        $('closeModal').addEventListener('click', closeModal);
        $('cancelBtn').addEventListener('click', closeModal);
        $('customerModal').addEventListener('click', (event) => {
            if (event.target.id === 'customerModal') closeModal();
        });

        $('keywordInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                state.currentPage = 1;
                loadData();
            }, 300);
        });

        $('statusSelect').addEventListener('change', function() {
            state.currentPage = 1;
            loadData();
        });

        $('pageSizeSelect').addEventListener('change', function() {
            state.pageSize = parseInt(this.value);
            state.currentPage = 1;
            render();
        });

        form.addEventListener('submit', saveCustomer);
        $('exportBtn').addEventListener('click', exportExcel);

        loadData();
        loadProvinces();
    });

    // ===== CRUD =====
    async function loadData() {
        const params = currentParams();
        const url = params ? `${API}?${params}` : API;

        try {
            const response = await fetch(url);
            if (!response.ok) return toast(await readError(response), true);
            const data = await response.json();

            if (Array.isArray(data)) {
                state.items = data;
                state.totalItems = data.length;
            } else if (data && Array.isArray(data.content)) {
                state.items = data.content;
                state.totalItems = data.totalElements ?? data.total ?? state.items.length;
            } else {
                state.items = [];
                state.totalItems = 0;
            }

            const pageSize = state.pageSize || 10;
            const totalPages = Math.max(1, Math.ceil((state.totalItems || state.items.length) / pageSize));
            if (!state.currentPage || state.currentPage > totalPages) state.currentPage = totalPages;

            render();
        } catch (error) {
            toast('Lỗi kết nối đến server', true);
            console.error(error);
        }
    }

    function currentParams() {
        const params = new URLSearchParams();
        const keyword = ($('keywordInput').value || '').trim();
        const trangThai = $('statusSelect').value;
        if (keyword) params.set('keyword', keyword);
        if (trangThai) params.set('trangThai', trangThai);
        return params.toString();
    }

    function render() {
        const total = state.items.length;
        const pageSize = state.pageSize || 10;
        const currentPage = Math.max(1, Math.min(state.currentPage || 1, Math.ceil(total / pageSize) || 1));
        state.currentPage = currentPage;

        const startIdx = (currentPage - 1) * pageSize;
        const endIdx = Math.min(startIdx + pageSize, total);

        document.getElementById('totalCount').textContent = total;
        document.getElementById('pageSizeSelect').value = pageSize;

        $('empty').hidden = total > 0;

        if (total === 0) {
            $('rows').innerHTML = '';
            renderPagination();
            return;
        }

        const pageItems = state.items.slice(startIdx, endIdx);
        $('rows').innerHTML = pageItems.map((kh, idx) => {
            const index = startIdx + idx + 1;
            const fullAddress = kh.diaChiDisplay || '';
            return `
            <tr>
                <td>${index}</td>
                <td><span class="code">${esc(kh.maKh)}</span></td>
                <td>${esc(kh.tenKhachHang)}</td>
                <td>${esc(kh.email)}</td>
                <td>${esc(kh.soDienThoai)}</td>
                <td class="col-cccd">${esc(kh.cccd)}</td>
                <td>${esc(fullAddress)}</td>
                <td>${esc(kh.gioiTinh)}</td>
                <td>${formatDate(kh.ngaySinh)}</td>
                <td><span class="badge ${kh.trangThai ? 'on' : 'off'}">${kh.trangThai ? 'Hoạt động' : 'Ngừng'}</span></td>
                <td>
                    <div class="actions">
                        <button class="action-btn edit" onclick="openModal(${kh.id})" title="Sửa">✎</button>
                        <label class="switch" title="${kh.trangThai ? 'Chuyển sang ngừng hoạt động' : 'Chuyển sang hoạt động'}">
                            <input type="checkbox" ${kh.trangThai ? 'checked' : ''} onchange="toggleStatus(${kh.id})">
                            <span></span>
                        </label>
                    </div>
                </td>
            </tr>
        `}).join('');
        renderPagination();
    }

    function renderPagination() {
        const total = state.items.length;
        const pageSize = state.pageSize || 10;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        const currentPage = state.currentPage || 1;

        const container = document.getElementById('pagination');
        container.innerHTML = '';

        if (totalPages <= 1) {
            const info = document.createElement('span');
            info.className = 'page-info';
            info.textContent = `Trang 1 / 1`;
            container.appendChild(info);
            return;
        }

        const prev = document.createElement('button');
        prev.className = 'btn';
        prev.textContent = '‹ Trước';
        prev.disabled = currentPage === 1;
        prev.onclick = () => changePage(currentPage - 1);
        container.appendChild(prev);

        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);

        if (start > 1) {
            const first = document.createElement('button');
            first.className = 'btn';
            first.textContent = '1';
            first.onclick = () => changePage(1);
            container.appendChild(first);
            if (start > 2) {
                const dots = document.createElement('span');
                dots.className = 'page-info';
                dots.textContent = '…';
                container.appendChild(dots);
            }
        }

        for (let p = start; p <= end; p++) {
            const b = document.createElement('button');
            b.className = 'btn' + (p === currentPage ? ' primary' : '');
            b.textContent = p;
            b.onclick = () => changePage(p);
            container.appendChild(b);
        }

        if (end < totalPages) {
            if (end < totalPages - 1) {
                const dots = document.createElement('span');
                dots.className = 'page-info';
                dots.textContent = '…';
                container.appendChild(dots);
            }
            const last = document.createElement('button');
            last.className = 'btn';
            last.textContent = totalPages;
            last.onclick = () => changePage(totalPages);
            container.appendChild(last);
        }

        const next = document.createElement('button');
        next.className = 'btn';
        next.textContent = 'Tiếp ›';
        next.disabled = currentPage === totalPages;
        next.onclick = () => changePage(currentPage + 1);
        container.appendChild(next);

        const info = document.createElement('span');
        info.className = 'page-info';
        info.textContent = `Trang ${currentPage} / ${totalPages} (${total} khách hàng)`;
        container.appendChild(info);
    }

    function changePage(page) {
        const total = state.items.length;
        const totalPages = Math.max(1, Math.ceil(total / (state.pageSize || 10)));
        const p = Math.max(1, Math.min(page, totalPages));
        state.currentPage = p;
        render();
        document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
    }

    // ----- MỞ MODAL (ĐÃ XÓA MÃ TỰ ĐỘNG VÀ TRẠNG THÁI) -----
    function openModal(id) {
        form.reset();
        $('modalTitle').textContent = id ? 'Cập nhật khách hàng' : 'Thêm khách hàng';

        // Reset địa chỉ
        document.getElementById('provinceSelect').value = '';
        document.getElementById('districtSelect').innerHTML = '<option value="">-- Chọn Quận/Huyện --</option>';
        document.getElementById('wardSelect').innerHTML = '<option value="">-- Chọn Phường/Xã --</option>';
        document.getElementById('inputDiaChiChiTiet').value = '';

        if (id) {
            const kh = state.items.find(item => item.id === id);
            if (!kh) {
                toast('Không tìm thấy khách hàng!', true);
                return;
            }
            // Gán dữ liệu
            Object.entries(kh).forEach(([key, value]) => {
                if (form.elements[key]) form.elements[key].value = value ?? '';
            });
            form.elements.ngaySinh.value = toDateInput(kh.ngaySinh);

            // Load địa chỉ (nếu có)
            if (kh.tinhThanhCode) {
                document.getElementById('provinceSelect').value = kh.tinhThanhCode;
                setTimeout(async () => {
                    await onProvinceChange();
                    if (kh.quanHuyenCode) {
                        document.getElementById('districtSelect').value = kh.quanHuyenCode;
                        await onDistrictChange();
                        if (kh.phuongXaCode) {
                            document.getElementById('wardSelect').value = kh.phuongXaCode;
                        }
                    }
                }, 100);
            }
            document.getElementById('inputDiaChiChiTiet').value = kh.diaChiChiTiet || '';
        } else {
            // Thêm mới: không hiển thị mã tự động nữa
        }
        $('customerModal').hidden = false;
    }

    function closeModal() {
        $('customerModal').hidden = true;
    }

    // ----- LƯU KHÁCH HÀNG (tự động gán trạng thái = true khi thêm mới) -----
    async function saveCustomer(event) {
        event.preventDefault();
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const id = data.id;
        delete data.id;
        delete data.maKh;

        const provinceSelect = document.getElementById('provinceSelect');
        const districtSelect = document.getElementById('districtSelect');
        const wardSelect = document.getElementById('wardSelect');

        const provinceName = provinceSelect.options[provinceSelect.selectedIndex]?.text || '';
        const districtName = districtSelect.options[districtSelect.selectedIndex]?.text || '';
        const wardName = wardSelect.options[wardSelect.selectedIndex]?.text || '';

        data.tinhThanh = provinceName;
        data.tinhThanhCode = provinceSelect.value || null;
        data.quanHuyen = districtName;
        data.quanHuyenCode = districtSelect.value || null;
        data.phuongXa = wardName;
        data.phuongXaCode = wardSelect.value || null;
        data.diaChiChiTiet = document.getElementById('inputDiaChiChiTiet').value.trim() || null;

        // Nếu không có trạng thái trong form (đã xóa), set mặc định true cho thêm mới
        if (!id) {
            data.trangThai = true;   // Hoạt động
        } else {
            // Khi cập nhật, lấy trạng thái từ dữ liệu hiện tại (giữ nguyên)
            const existing = state.items.find(item => item.id === parseInt(id));
            if (existing) {
                data.trangThai = existing.trangThai;
            } else {
                data.trangThai = true; // fallback
            }
        }

        if (!data.ngaySinh) data.ngaySinh = null;
        Object.keys(data).forEach(key => { if (data[key] === '') data[key] = null; });

        try {
            const response = await fetch(id ? `${API}/${id}` : API, {
                method: id ? 'PUT' : 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                const error = await readError(response);
                return toast(error, true);
            }
            closeModal();
            toast(id ? '✅ Đã cập nhật khách hàng thành công!' : '✅ Đã thêm khách hàng thành công!');
            await loadData();
        } catch (error) {
            toast('❌ Lỗi khi lưu khách hàng', true);
            console.error(error);
        }
    }

    async function toggleStatus(id) {
        try {
            const response = await fetch(`${API}/${id}/trang-thai`, {method: 'PATCH'});
            if (!response.ok) {
                const error = await readError(response);
                return toast(error, true);
            }
            await loadData();
        } catch (error) {
            toast('Lỗi khi thay đổi trạng thái', true);
            console.error(error);
        }
    }

    async function exportExcel() {
        try {
            const params = currentParams();
            const url = params ? `${API}/xuat-excel?${params}` : `${API}/xuat-excel`;
            const response = await fetch(url);
            if (!response.ok) {
                const error = await readError(response);
                return toast(error, true);
            }
            const blob = await response.blob();
            download(blob, 'danh_sach_khach_hang.xlsx');
            toast('📥 Đang tải file Excel...');
        } catch (error) {
            toast('Lỗi khi xuất Excel', true);
            console.error(error);
        }
    }

    function download(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
    }

    async function readError(response) {
        try {
            const text = await response.text();
            const json = JSON.parse(text);
            return json.message || json.error || text;
        } catch {
            return response.statusText || 'Có lỗi xảy ra';
        }
    }

    function toast(message, error = false) {
        const el = document.createElement('div');
        el.className = `toast ${error ? 'error' : 'success'}`;
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    function formatDate(value) {
        if (!value) return '';
        const [y, m, d] = value.split('-');
        return d && m && y ? `${d}/${m}/${y}` : value;
    }

    function toDateInput(value) {
        return value ? value.substring(0, 10) : '';
    }

    function esc(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    }
</script>
</body>
