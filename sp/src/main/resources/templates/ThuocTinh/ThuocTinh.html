<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thuộc tính | 4MenStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="/js/app-shell.js" defer></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--sw:220px;--sbg:#2b1d0e;--sact:#7a5230;--gold:#c8a474;--bg:#f3f4f6;--white:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--r:8px;--danger:#dc2626}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.45;font-synthesis:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
        .app{display:flex;min-height:100vh}
        .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
        .topbar{background:var(--white);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:flex-end;padding:0 24px;gap:14px;position:sticky;top:0;z-index:50}
        .topbar-label{font-size:13px;color:var(--muted);font-weight:500}
        .topbar-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
        .content{padding:20px 24px;flex:1}
        .breadcrumb{font-size:12px;color:var(--muted);margin-bottom:6px}
        .breadcrumb span{color:var(--text);font-weight:600}
        .page-title{font-size:18px;font-weight:700;margin-bottom:18px}
        .filter-card,.table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r)}
        .filter-card{padding:12px 16px;margin-bottom:16px}
        .search-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .search-wrap input,.search-wrap select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:#f9fafb}
        .search-wrap input{flex:1;min-width:220px}
        .search-wrap input:focus,.search-wrap select:focus{border-color:var(--gold);background:#fff}
        .action-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;background:#fff;color:var(--text);white-space:nowrap}
        .btn:hover{border-color:#aaa}
        .btn-primary{background:var(--gold);color:#fff;border-color:var(--gold)}
        .btn-primary:hover{background:#a8895a;border-color:#a8895a}
        .btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
        .table-card{overflow:hidden}
        table{width:100%;border-collapse:collapse}
        thead tr{background:#f9fafb;border-bottom:1.5px solid var(--border)}
        th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
        td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
        tbody tr:hover{background:#fafafa}
        .td-code{font-family:monospace;font-size:12px;font-weight:700;background:#f3f4f6;padding:2px 6px;border-radius:4px;color:#374151}
        .badge-active,.badge-inactive{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
        .badge-active{background:#dcfce7;color:#16a34a}.badge-inactive{background:#fee2e2;color:#dc2626}
        .act-btns{display:flex;align-items:center;gap:4px}
        .ib{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);transition:all .13s}
        .ib:hover{background:#f3f4f6;color:var(--text)}
        .ib.edit:hover{background:rgba(200,164,116,.12);color:#a8895a}.ib.del:hover{background:#fee2e2;color:#dc2626}
        .toggle{position:relative;width:38px;height:21px;cursor:pointer;display:inline-block}
        .toggle input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;background:#d1d5db;border-radius:20px;transition:.3s}
        .slider::before{content:'';position:absolute;width:15px;height:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
        .toggle input:checked+.slider{background:#16a34a}.toggle input:checked+.slider::before{transform:translateX(17px)}
        .pagination{display:flex;align-items:center;justify-content:flex-start;padding:10px 16px;border-top:1px solid var(--border);background:#f9fafb;flex-wrap:wrap;gap:8px}
        .pg-info{font-size:13px;color:var(--muted);white-space:nowrap}
        .pg-nav{display:flex;gap:3px;align-items:center}
        .pg-btn{min-width:32px;height:32px;padding:0 8px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--muted)}
        .pg-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}.pg-btn:disabled{opacity:.4;cursor:not-allowed}
        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
        .modal-bg.show{display:flex}.modal-box{background:#fff;border-radius:12px;width:92%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .modal-head h2{font-size:15px}.modal-close{width:30px;height:30px;border-radius:7px;border:none;background:#f3f4f6;cursor:pointer}
        .modal-body{padding:20px 22px}.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#f9fafb;border-radius:0 0 12px 12px}
        .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}.form-group label{font-size:12px;font-weight:700}
        .form-group input{padding:9px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none}
        .status-row{display:flex;align-items:center;gap:10px;padding-top:4px}
        .toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
        .toast{display:flex;align-items:center;gap:9px;background:#1f2937;color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:all;min-width:220px}
        .toast.success{background:#166534}.toast.error{background:#991b1b}.toast.info{background:#1e40af}
        .spin{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite}@keyframes rot{to{transform:rotate(360deg)}}
        .load-state,.empty-state{text-align:center;padding:40px;color:var(--muted)}
        @media (max-width:760px){.app{display:block}.main{margin-left:0}.content{padding:16px}}
    
        .search-combo{position:relative;width:100%;flex:1;font-family:inherit}
        .search-combo-display{width:100%;min-height:34px;padding:7px 32px 7px 10px;border:1px solid var(--border);border-radius:6px;background:#f9fafb;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
        .search-combo-display::after{content:'v';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px}
        .search-combo.open .search-combo-display{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(200,164,116,.12)}
        .search-combo-panel{display:none;position:absolute;z-index:500;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--border);border-radius:7px;box-shadow:0 12px 28px rgba(0,0,0,.16);overflow:hidden}
        .search-combo.open .search-combo-panel{display:block}
        .search-combo-search{width:calc(100% - 14px);margin:7px;padding:7px 9px;border:1px solid var(--border);border-radius:5px;font-size:13px;font-family:inherit;outline:none;background:#fff}
        .search-combo-search:focus{border-color:var(--gold)}
        .search-combo-list{max-height:220px;overflow:auto;padding:4px 0}
        .search-combo-option{padding:8px 10px;font-size:13px;cursor:pointer;color:var(--text)}
        .search-combo-option:hover,.search-combo-option.active{background:rgba(200,164,116,.14);color:#7a5230}
        .search-combo-empty{padding:9px 10px;font-size:13px;color:var(--muted)}
        select.search-combo-source{display:none!important}

    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar"></aside>
    <div class="main">
        <header class="topbar">
            <span class="topbar-label">Quản trị hệ thống</span>
            <div class="topbar-avatar">T</div>
        </header>
        <div class="content">
            <div class="breadcrumb">Quản lý sản phẩm / <span id="crumbName">Thuộc tính</span></div>
            <div class="page-title" id="pageTitle">Quản lý thuộc tính</div>
            <div class="filter-card">
                <div class="search-wrap">
                    <i class="fas fa-search" style="color:var(--muted)"></i>
                    <input type="text" id="searchInput" placeholder="Tìm kiếm..." oninput="debounceLoad()">
                    <select id="statusFilter" onchange="applyFilters()">
                        <option value="">Tất cả trạng thái</option>
                        <option value="true">Hoạt động</option>
                        <option value="false">Ngừng hoạt động</option>
                    </select>
                    <button class="btn" onclick="loadData()"><i class="fas fa-sync-alt"></i> Làm mới</button>
                </div>
            </div>
            <div class="action-bar">
                <button class="btn" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Tải Excel</button>
                <button class="btn btn-primary" onclick="openCreate()"><i class="fas fa-plus"></i> Thêm</button>
            </div>
            <div class="table-card">
                <div id="tblWrap"><div class="load-state"><div class="spin"></div><div style="margin-top:10px">Đang tải...</div></div></div>
                <div id="pgWrap" style="display:none"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal-bg" id="mdForm">
    <div class="modal-box">
        <div class="modal-head">
            <h2 id="mdTitle">Thêm thuộc tính</h2>
            <button class="modal-close" onclick="closeModal('mdForm')">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label id="codeLabel">Mã <span style="color:#dc2626">*</span></label>
                <input type="text" id="inMa">
            </div>
            <div class="form-group">
                <label id="nameLabel">Tên <span style="color:#dc2626">*</span></label>
                <input type="text" id="inTen">
            </div>
            <div class="form-group">
                <label>Trạng thái</label>
                <div class="status-row">
                    <label class="toggle"><input type="checkbox" id="inStatus" checked><span class="slider"></span></label>
                    <span id="statusLabel">Hoạt động</span>
                </div>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn" onclick="closeModal('mdForm')">Hủy</button>
            <button class="btn btn-primary" onclick="save()">Lưu</button>
        </div>
    </div>
</div>

<div class="modal-bg" id="mdConfirm">
    <div class="modal-box" style="max-width:400px">
        <div class="modal-body" style="text-align:center">
            <div style="font-size:42px;margin-bottom:10px">⚠️</div>
            <h3 style="font-size:15px;margin-bottom:8px">Xác nhận xóa</h3>
            <p style="color:var(--muted)">Bạn có chắc chắn muốn xóa thuộc tính này?</p>
        </div>
        <div class="modal-foot" style="justify-content:center">
            <button class="btn" onclick="closeModal('mdConfirm')">Hủy</button>
            <button class="btn btn-danger" id="confirmDeleteBtn">Xóa</button>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
    const CONFIGS = {
        'xuat-xu': { title: 'Xuất xứ', group: 'Thuộc tính sản phẩm', table: 'san_pham', code: 'Mã xuất xứ', name: 'Tên xuất xứ', id: 'idXuatXu', ma: 'maXuatXu', ten: 'tenXuatXu', file: 'XuatXu' },
        'chat-lieu': { title: 'Chất liệu', group: 'Thuộc tính sản phẩm', table: 'san_pham', code: 'Mã chất liệu', name: 'Tên chất liệu', id: 'idChatLieu', ma: 'maChatLieu', ten: 'tenChatLieu', file: 'ChatLieu' },
        'loai-ao': { title: 'Loại áo', group: 'Thuộc tính biến thể', table: 'chi_tiet_san_pham', code: 'Mã loại', name: 'Tên loại', id: 'idLoaiAo', ma: 'maLoai', ten: 'tenLoai', file: 'LoaiAo' },
        'kich-co': { title: 'Kích cỡ', group: 'Thuộc tính biến thể', table: 'chi_tiet_san_pham', code: 'Mã kích cỡ', name: 'Tên kích cỡ', id: 'idKichCo', ma: 'maKichCo', ten: 'tenKichCo', file: 'KichCo' },
        'mau-sac': { title: 'Màu sắc', group: 'Thuộc tính biến thể', table: 'chi_tiet_san_pham', code: 'Mã màu sắc', name: 'Tên màu sắc', id: 'idMauSac', ma: 'maMauSac', ten: 'tenMauSac', file: 'MauSac' },
        'phong-cach-mac': { title: 'Phong cách mặc', group: 'Thuộc tính biến thể', table: 'chi_tiet_san_pham', code: 'Mã phong cách', name: 'Tên phong cách', id: 'idPhongCachMac', ma: 'maPhongCachMac', ten: 'tenPhongCach', file: 'PhongCachMac' },
        'kieu-dang': { title: 'Kiểu dáng', group: 'Thuộc tính biến thể', table: 'chi_tiet_san_pham', code: 'Mã kiểu dáng', name: 'Tên kiểu dáng', id: 'idKieuDang', ma: 'maKieuDang', ten: 'tenKieuDang', file: 'KieuDang' }
    };
    const slug = location.pathname.split('/').filter(Boolean).pop();
    const cfg = CONFIGS[slug] || CONFIGS['loai-ao'];
    const API = `/api/thuoc-tinh/${slug}`;
    const PAGE_SIZE = 5;

    let allData = [];
    let filteredData = [];
    let currentPage = 0;
    let totalElements = 0;
    let deleteId = null;
    let timer = null;

    function initLabels() {
        document.title = `Quản lý ${cfg.title} | 4MenStore`;
        document.getElementById('crumbName').textContent = `${cfg.group} / ${cfg.title}`;
        document.getElementById('pageTitle').textContent = `Quản lý ${cfg.title}`;
        document.getElementById('codeLabel').innerHTML = `${cfg.code} <span style="color:#dc2626">*</span>`;
        document.getElementById('nameLabel').innerHTML = `${cfg.name} <span style="color:#dc2626">*</span>`;
        document.getElementById('searchInput').placeholder = `Tìm kiếm ${cfg.title.toLowerCase()}...`;
    }
    function esc(s){return String(s ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function toast(msg,type='success'){const w=document.getElementById('toastWrap');const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;w.appendChild(el);setTimeout(()=>el.remove(),3000)}
    function closeModal(id){document.getElementById(id).classList.remove('show')}
    function debounceLoad(){clearTimeout(timer);timer=setTimeout(()=>applyFilters(),350)}
    function badge(v){return v!==false?'<span class="badge-active">Hoạt động</span>':'<span class="badge-inactive">Ngừng hoạt động</span>'}
    async function errorMsg(r){try{const t=await r.text();try{const j=JSON.parse(t);return j.message||j.error||t}catch(e){return t}}catch(e){return 'Đã xảy ra lỗi'}}

    async function loadData() {
        document.getElementById('tblWrap').innerHTML='<div class="load-state"><div class="spin"></div><div style="margin-top:10px">Đang tải...</div></div>';
        try {
            const r=await fetch(`${API}?page=0&size=9999`);
            if(!r.ok) throw new Error(await r.text() || `HTTP ${r.status}`);
            const data=await r.json();
            allData=data.content||[];
            applyFilters();
        } catch(e) {
            document.getElementById('tblWrap').innerHTML=`<div class="empty-state">Không tải được dữ liệu.<br><small>${esc(e.message)}</small></div>`;
            document.getElementById('pgWrap').style.display='none';
        }
    }

    function applyFilters() {
        const kw = document.getElementById('searchInput').value.trim().toLowerCase();
        const status = document.getElementById('statusFilter').value;
        filteredData = allData.filter(item => {
            const maMatch = (item[cfg.ma] || '').toLowerCase().includes(kw);
            const tenMatch = (item[cfg.ten] || '').toLowerCase().includes(kw);
            if (!maMatch && !tenMatch) return false;
            if (status !== '') {
                const isActive = status === 'true';
                if (item.trangThai !== isActive) return false;
            }
            return true;
        });
        totalElements = filteredData.length;
        currentPage = 0;
        renderTable();
        renderPagination();
    }

    function renderTable() {
        const start = currentPage * PAGE_SIZE;
        const pageItems = filteredData.slice(start, start + PAGE_SIZE);
        const wrap = document.getElementById('tblWrap');
        if (!pageItems.length) {
            wrap.innerHTML = '<div class="empty-state">Không có dữ liệu.</div>';
            return;
        }
        const rows = pageItems.map((it, idx) => {
            const id = it[cfg.id];
            return `<tr>
                <td>${start + idx + 1}</td>
                <td><span class="td-code">${esc(it[cfg.ma])||'—'}</span></td>
                <td>${esc(it[cfg.ten])||'—'}</td>
                <td>${badge(it.trangThai)}</td>
                <td><div class="act-btns">
                    <button class="ib edit" title="Sửa" onclick="openEdit(${id})"><i class="fas fa-pen"></i></button>
                    <label class="toggle" title="Bật/Tắt"><input type="checkbox" ${it.trangThai!==false?'checked':''} onchange="toggleStatus(${id},this)"><span class="slider"></span></label>
                </div></td>
            </tr>`;
        }).join('');
        wrap.innerHTML = `<table><thead><tr><th>STT</th><th>${cfg.code}</th><th>${cfg.name}</th><th>Trạng thái</th><th>Hành động</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function renderPagination() {
        const area = document.getElementById('pgWrap');
        const totalPages = Math.max(1, Math.ceil(totalElements / PAGE_SIZE));
        if (totalPages <= 1) { area.style.display = 'none'; area.innerHTML = ''; return; }
        const current = currentPage;
        const maxVisible = 5;
        let start = Math.max(0, current - 2);
        let end = Math.min(totalPages, start + maxVisible);
        if (end - start < maxVisible) start = Math.max(0, end - maxVisible);
        let nums = '';
        if (start > 0) { nums += `<button class="pg-btn" onclick="goPage(0)">1</button>`; if (start > 1) nums += `<span style="padding:0 4px;color:var(--muted)">...</span>`; }
        for (let i = start; i < end; i++) nums += `<button class="pg-btn ${i === current ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
        if (end < totalPages) { if (end < totalPages - 1) nums += `<span style="padding:0 4px;color:var(--muted)">...</span>`; nums += `<button class="pg-btn" onclick="goPage(${totalPages - 1})">${totalPages}</button>`; }
        area.innerHTML = `<div class="pagination"><div class="pg-info">Trang ${current + 1}/${totalPages} - ${totalElements} bản ghi</div><div class="pg-nav"><button class="pg-btn" onclick="goPage(${current - 1})" ${current === 0 ? 'disabled' : ''}>Trước</button>${nums}<button class="pg-btn" onclick="goPage(${current + 1})" ${current >= totalPages - 1 ? 'disabled' : ''}>Sau</button></div></div>`;
        area.style.display = 'block';
    }

    function goPage(page) {
        currentPage = page;
        renderTable();
        renderPagination();
    }

    function openCreate(){document.getElementById('mdTitle').textContent=`Thêm ${cfg.title}`;document.getElementById('editId').value='';document.getElementById('inMa').value='';document.getElementById('inTen').value='';document.getElementById('inStatus').checked=true;document.getElementById('statusLabel').textContent='Hoạt động';document.getElementById('mdForm').classList.add('show')}
    function openEdit(id){const it=allData.find(x=>x[cfg.id]===id);if(!it)return toast('Không tìm thấy dữ liệu','error');document.getElementById('mdTitle').textContent=`Sửa ${cfg.title}`;document.getElementById('editId').value=id;document.getElementById('inMa').value=it[cfg.ma]||'';document.getElementById('inTen').value=it[cfg.ten]||'';document.getElementById('inStatus').checked=it.trangThai!==false;document.getElementById('statusLabel').textContent=it.trangThai!==false?'Hoạt động':'Ngừng hoạt động';document.getElementById('mdForm').classList.add('show')}
    document.getElementById('inStatus').addEventListener('change',e=>document.getElementById('statusLabel').textContent=e.target.checked?'Hoạt động':'Ngừng hoạt động');

    async function save(){
        const id=document.getElementById('editId').value;
        const payload={ma:document.getElementById('inMa').value.trim(),ten:document.getElementById('inTen').value.trim(),trangThai:document.getElementById('inStatus').checked};
        if(!payload.ma||!payload.ten)return toast('Vui lòng nhập đầy đủ mã và tên','error');
        if(payload.ma.length<2||payload.ma.length>30)return toast('Mã phải từ 2 đến 30 ký tự','error');
        if(payload.ten.length<2||payload.ten.length>100)return toast('Tên phải từ 2 đến 100 ký tự','error');
        if(!/^[A-Za-z0-9_-]+$/.test(payload.ma))return toast('Mã chỉ được chứa chữ, số, gạch ngang hoặc gạch dưới','error');
        const duplicated=allData.some(it=>String(it[cfg.id])!==String(id||'')&&(String(it[cfg.ma]||'').trim().toLowerCase()===payload.ma.toLowerCase()||String(it[cfg.ten]||'').trim().toLowerCase()===payload.ten.toLowerCase()));
        if(duplicated)return toast('Mã hoặc tên đã tồn tại','error');
        const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(r.ok){toast(id?'Cập nhật thành công':'Thêm mới thành công');closeModal('mdForm');loadData()}else toast(await errorMsg(r),'error');
    }

    async function toggleStatus(id,cb){
        const status=cb.checked;cb.disabled=true;
        const r=await fetch(`${API}/${id}/trang-thai`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({trangThai:status})});
        if(r.ok){const it=allData.find(x=>x[cfg.id]===id);if(it)it.trangThai=status;applyFilters();toast('Đã cập nhật trạng thái')}else{cb.checked=!status;toast(await errorMsg(r),'error')}
        cb.disabled=false;
    }

    function openDelete(id){deleteId=id;document.getElementById('mdConfirm').classList.add('show')}
    document.getElementById('confirmDeleteBtn').addEventListener('click',async()=>{if(!deleteId)return;const r=await fetch(`${API}/${deleteId}`,{method:'DELETE'});if(r.ok){toast('Xóa thành công');closeModal('mdConfirm');loadData()}else toast(await errorMsg(r),'error');deleteId=null});

    async function exportExcel(){const rows=[['STT',cfg.code,cfg.name,'Trạng thái']];filteredData.forEach((it,i)=>rows.push([i+1,it[cfg.ma]||'',it[cfg.ten]||'',it.trangThai!==false?'Hoạt động':'Ngừng hoạt động']));const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,cfg.file);XLSX.writeFile(wb,`${cfg.file}_${new Date().toISOString().slice(0,10)}.xlsx`)}

    document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show')}));
    initLabels();
    loadData();

    function comboEscapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
    function initSearchableComboboxes(root=document){
        root.querySelectorAll('select').forEach(select=>{
            if(select.classList.contains('search-combo-source')){syncSearchCombo(select);return;}
            const combo=document.createElement('div');
            combo.className='search-combo';
            combo.innerHTML='<div class="search-combo-display" tabindex="0"></div><div class="search-combo-panel"><input class="search-combo-search" type="text" autocomplete="off" placeholder="Tim kiem..."><div class="search-combo-list"></div></div>';
            select.classList.add('search-combo-source');
            select.parentNode.insertBefore(combo, select.nextSibling);
            combo._select=select;
            const display=combo.querySelector('.search-combo-display');
            const search=combo.querySelector('.search-combo-search');
            display.addEventListener('click',()=>openSearchCombo(combo));
            display.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openSearchCombo(combo)}});
            search.addEventListener('input',()=>renderSearchComboOptions(combo, search.value));
            search.addEventListener('keydown',e=>{if(e.key==='Escape') closeSearchCombo(combo)});
            select.addEventListener('change',()=>syncSearchCombo(select));
            new MutationObserver(()=>syncSearchCombo(select)).observe(select,{childList:true,subtree:true,attributes:true,attributeFilter:['selected','disabled']});
            syncSearchCombo(select);
        });
    }
    function openSearchCombo(combo){
        if(combo.classList.contains('open')){closeSearchCombo(combo);return;}
        document.querySelectorAll('.search-combo.open').forEach(c=>{if(c!==combo)c.classList.remove('open')});
        combo.classList.add('open');
        const search=combo.querySelector('.search-combo-search');
        search.value='';
        renderSearchComboOptions(combo,'');
        setTimeout(()=>search.focus(),0);
    }
    function closeSearchCombo(combo){combo.classList.remove('open')}
    function syncSearchCombo(select){
        const combo=select.nextElementSibling?.classList?.contains('search-combo')?select.nextElementSibling:null;
        if(!combo)return;
        const selected=select.options[select.selectedIndex];
        combo.querySelector('.search-combo-display').textContent=selected?.textContent||select.querySelector('option')?.textContent||'Chon';
        renderSearchComboOptions(combo, combo.querySelector('.search-combo-search')?.value||'');
    }
    function renderSearchComboOptions(combo, keyword){
        const select=combo._select;
        const list=combo.querySelector('.search-combo-list');
        const kw=String(keyword||'').trim().toLowerCase();
        const options=[...select.options].filter(o=>!o.disabled&&(!kw||o.textContent.toLowerCase().includes(kw)));
        if(!options.length){list.innerHTML='<div class="search-combo-empty">Khong tim thay</div>';return;}
        list.innerHTML=options.map(o=>'<div class="search-combo-option '+(o.selected?'active':'')+'" data-value="'+comboEscapeHtml(o.value)+'">'+comboEscapeHtml(o.textContent)+'</div>').join('');
        list.querySelectorAll('.search-combo-option').forEach(item=>item.addEventListener('click',()=>{
            select.value=item.dataset.value;
            select.dispatchEvent(new Event('change',{bubbles:true}));
            closeSearchCombo(combo);
        }));
    }
    document.addEventListener('click',e=>{if(!e.target.closest('.search-combo'))document.querySelectorAll('.search-combo.open').forEach(closeSearchCombo)});
    document.addEventListener('DOMContentLoaded',()=>initSearchableComboboxes());
    if(!window._searchComboAutoSync){window._searchComboAutoSync=setInterval(()=>document.querySelectorAll('select.search-combo-source').forEach(syncSearchCombo),300)}

</script>
</body>
</html>
